<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Primer mes ♥</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Dancing+Script:wght@400;600;700&family=Cinzel:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --crimson:      #c41e3a;
      --deep-red:     #8b0000;
      --rose:         #e8486a;
      --purple:       #7b2d8b;
      --deep-purple:  #4a0e5c;
      --lavender:     #c49dfa;
      --light-purple: #e0c8ff;
      --bg:           #080112;
      --card-bg:      rgba(14, 4, 28, 0.88);
      --text:         #f0e6ff;
      --text-dim:     #c4a8e0;
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 15% 40%, rgba(74, 14, 92, 0.4) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 60%, rgba(139, 0, 0, 0.3) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 10%, rgba(123, 45, 139, 0.2) 0%, transparent 50%),
        #080112;
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--text);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Background ── */
    #starCanvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    #petals {
      position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden;
    }
    .petal {
      position: absolute; top: -40px;
      border-radius: 62% 38% 70% 30% / 45% 55% 45% 55%;
      animation: petalFall linear infinite; will-change: transform, opacity;
    }
    @keyframes petalFall {
      0%   { transform: translateY(-40px)  rotate(0deg)   translateX(0px);   opacity: 0; }
      8%   { opacity: 0.65; }
      50%  { transform: translateY(52vh)   rotate(380deg) translateX(50px);  opacity: 0.55; }
      92%  { opacity: 0.4; }
      100% { transform: translateY(108vh)  rotate(740deg) translateX(-25px); opacity: 0; }
    }

    /* ── Layout ── */
    main {
      position: relative; z-index: 2;
      min-height: 100vh;
      padding: 60px 20px 90px;
      display: flex; flex-direction: column; align-items: center;
    }

    /* ── Page header ── */
    .page-header { text-align: center; margin-bottom: 48px; }

    .month-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(196, 30, 58, 0.1);
      border: 1px solid rgba(196, 30, 58, 0.28);
      border-radius: 20px; padding: 6px 20px; margin-bottom: 20px;
    }
    .month-badge span {
      font-family: 'Cinzel', serif; font-size: 0.6rem;
      letter-spacing: 3.5px; color: var(--rose);
    }

    .page-title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2.3rem, 7vw, 3.8rem);
      color: var(--lavender); line-height: 1.2;
      margin-bottom: 10px;
    }
    .page-subtitle {
      font-family: 'Cinzel', serif; font-size: 0.62rem;
      letter-spacing: 4px; color: var(--text-dim); opacity: 0.6;
      text-transform: uppercase;
    }

    .header-ornament {
      display: flex; align-items: center; gap: 14px;
      justify-content: center; margin-top: 18px;
    }
    .header-ornament::before, .header-ornament::after {
      content: ''; display: block; width: 65px; height: 1px;
    }
    .header-ornament::before { background: linear-gradient(to right, transparent, rgba(196, 30, 58, 0.5)); }
    .header-ornament::after  { background: linear-gradient(to left,  transparent, rgba(196, 30, 58, 0.5)); }
    .header-ornament .orn { color: var(--crimson); font-size: 0.75rem; letter-spacing: 6px; opacity: 0.6; }

    /* ── Heart container ── */
    .heart-section { display: flex; justify-content: center; width: 100%; margin-bottom: 64px; }

    #heartContainer { position: relative; flex-shrink: 0; }

    .heart-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

    /* ── Song chips ── */
    .song-chip {
      position: absolute;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-decoration: none; cursor: pointer;
      background: rgba(10, 2, 22, 0.88);
      border-radius: 24px;
      padding: 5px 12px;
      border: 1px solid rgba(196, 30, 58, 0.38);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease, border-color 0.25s ease;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .song-chip:nth-child(even) { border-color: rgba(196, 157, 250, 0.35); }

    .song-chip:hover, .song-chip:active {
      transform: scale(1.08) translateZ(0);
      background: rgba(196, 30, 58, 0.16);
      border-color: var(--rose);
      box-shadow: 0 0 18px rgba(196, 30, 58, 0.35), 0 0 36px rgba(196, 30, 58, 0.1);
      z-index: 20;
    }
    .song-chip:nth-child(even):hover, .song-chip:nth-child(even):active {
      background: rgba(123, 45, 139, 0.18);
      border-color: var(--lavender);
      box-shadow: 0 0 18px rgba(196, 157, 250, 0.3), 0 0 36px rgba(123, 45, 139, 0.12);
    }

    .chip-title {
      display: block; font-family: 'Cormorant Garamond', serif;
      font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      width: 100%; text-align: center; line-height: 1.3;
    }
    .chip-artist {
      display: block; font-family: 'Cinzel', serif; letter-spacing: 0.5px;
      color: var(--text-dim); opacity: 0.65;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      width: 100%; text-align: center; line-height: 1.3;
    }

    /* ── Divider ── */
    .section-sep {
      width: 100%; max-width: 620px;
      display: flex; align-items: center; gap: 16px;
      margin: 0 0 52px;
    }
    .section-sep::before, .section-sep::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, rgba(196, 30, 58, 0.35), transparent);
    }
    .sep-icon { color: var(--crimson); font-size: 0.9rem; opacity: 0.5; letter-spacing: 6px; }

    /* ── Lyrics section ── */
    .lyrics-section { width: 100%; max-width: 680px; }

    .lyrics-heading {
      font-family: 'Cinzel', serif; font-size: 0.65rem;
      letter-spacing: 4px; text-transform: uppercase;
      color: var(--text-dim); opacity: 0.55;
      text-align: center; margin-bottom: 36px;
    }

    .lyric-card {
      background: rgba(12, 3, 24, 0.75);
      border: 1px solid rgba(196, 157, 250, 0.09);
      border-left: 2px solid var(--crimson);
      border-radius: 0 4px 4px 0;
      padding: 30px 34px 26px;
      margin-bottom: 22px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: border-left-color 0.35s;
    }
    .lyric-card:nth-child(even)       { border-left-color: var(--purple); }
    .lyric-card:hover                  { border-left-color: var(--rose); }
    .lyric-card:nth-child(even):hover  { border-left-color: var(--lavender); }

    /* Glow line top */
    .lyric-card::before {
      content: '';
      position: absolute; top: 0; left: 5%; width: 90%; height: 1px;
      background: linear-gradient(to right, transparent, rgba(196, 30, 58, 0.2), transparent);
    }

    .lyric-quote-mark {
      position: absolute; top: 8px; left: 20px;
      font-family: 'Cormorant Garamond', serif; font-size: 4.5rem;
      line-height: 1; color: var(--crimson); opacity: 0.14;
      user-select: none; pointer-events: none;
    }
    .lyric-card:nth-child(even) .lyric-quote-mark { color: var(--lavender); }

    .lyric-lines {
      font-size: clamp(1.05rem, 3.2vw, 1.22rem);
      font-style: italic; font-weight: 300;
      line-height: 1.9; color: var(--text);

    .lyric-note {

      font-style: italic; color: var(--lavender); opacity: 0.7;

    /* ── Responsive ── */
    @media (max-width: 600px) {
      main { padding: 48px 14px 70px; }
      .lyric-card { padding: 26px 20px 22px; }
      .lyric-quote-mark { font-size: 3.5rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .petal { animation-duration: 25s; }
    }
  </style>
</head>

<script>

  { title: "Te Encontre",  artist: "El Vega",  url: "https://open.spotify.com/intl-es/track/2kP6fOqdSQ5CYqVH5z5844?si=e23c45d1374c455e" },
  { title: "Loca",  artist: "Tan Bionica",  url: "https://open.spotify.com/intl-es/track/2n0NCtkvHx1oPqgiAvexiB?si=851f6c5603104d07" },
  { title: "Must Be Love", artist: "Niall Horan",  url: "https://open.spotify.com/intl-es/track/4rYNrM5Yfi7vAs0PF3WnZW?si=01066733f310453a" },
  { title: "Shut Up and Dance", artist: "Walk the Moon",  url: "https://open.spotify.com/intl-es/track/4kbj5MwxO1bq9wjT5g9HaA?si=51937e55f5734b95" },
  { title: "Loquita", artist: "Marama",  url: "https://open.spotify.com/intl-es/track/2xjcDF21U2ccgE2LEeiMbf?si=b64d1d19a5cd465b" },
];

const LYRICS = [

    title: "Lo mejor del amor",
    artist: "Rodrigo",
    lines: `"Fue lo mejor del amor\nLo que he vivido contigo"`,

  },

// Pegá acá el link de tu playlist de Spotify:
const PLAYLIST_URL = "https://open.spotify.com/playlist/6fAcel20go6GQqBSG7IP0I?si=54bc1ab5c8d04cc4&pt=93ec8eac066807ed145dd0367d675143";

// ============================================================

// ── Stars ────────────────────────────────────────────────────
const canvas = document.getElementById('starCanvas');
const ctx    = canvas.getContext('2d');
let stars    = [];

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
function initStars() {
  stars = [];
  const n = Math.min(Math.floor((canvas.width * canvas.height) / 6500), 200);
  for (let i = 0; i < n; i++) {
    stars.push({
      x: Math.random() * canvas.width, y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.2, offset: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.005 + 0.001, hue: Math.floor(Math.random() * 3),
    });
  }
}
function drawStars(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const s of stars) {
    const a = 0.25 + 0.55 * Math.abs(Math.sin(t * s.speed + s.offset));
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    if      (s.hue === 1) ctx.fillStyle = `rgba(196,30,58,${(a*0.7).toFixed(2)})`;
    else if (s.hue === 2) ctx.fillStyle = `rgba(196,157,250,${(a*0.8).toFixed(2)})`;
    else                  ctx.fillStyle = `rgba(255,255,255,${a.toFixed(2)})`;
    ctx.fill();
  }
}
let st = 0;
(function tick() { st += 0.016; drawStars(st); requestAnimationFrame(tick); })();
resizeCanvas(); initStars();
window.addEventListener('resize', () => { resizeCanvas(); initStars(); });

// ── Petals ───────────────────────────────────────────────────
const petalPalette = [
  ['#c41e3a','#8b0000'], ['#7b2d8b','#4a0e5c'],
  ['#9b3dab','#6b1a7a'], ['#d4186c','#9b0040'],
];
for (let i = 0; i < 22; i++) {
  const el = document.createElement('div'); el.className = 'petal';
  const [c1,c2] = petalPalette[Math.floor(Math.random() * petalPalette.length)];
  const w = Math.random()*10+6, h = w*(Math.random()*0.7+1.1);
  el.style.cssText = `left:${(Math.random()*103-1.5).toFixed(1)}%;width:${w.toFixed(1)}px;height:${h.toFixed(1)}px;background:linear-gradient(135deg,${c1},${c2});animation-duration:${(Math.random()*9+9).toFixed(2)}s;animation-delay:${(Math.random()*15).toFixed(2)}s;animation-name:petalFall;opacity:0;`;
  document.getElementById('petals').appendChild(el);
}

// ── Heart ─────────────────────────────────────────────────────
// Parametric heart: x = 16 sin³(t), y_math = 13cos(t)-5cos(2t)-2cos(3t)-cos(4t)
// Math y-range ≈ [-17, 12]. Screen y = cy - y_math * scale.

function heartMath(t) {
  return {
    x: 16 * Math.pow(Math.sin(t), 3),
    y: 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t),
  };
}

// Distribución por longitud de arco real: evita que las canciones
// se amontonen en el cuello y la punta (zonas de baja velocidad paramétrica).
function arcLengthParams(n) {
  const S = 4000;
  const cumLen = [0];
  let prev = heartMath(0);
  for (let i = 1; i <= S; i++) {
    const t   = (i / S) * 2 * Math.PI;
    const cur = heartMath(t);
    const dx  = cur.x - prev.x, dy = cur.y - prev.y;
    cumLen.push(cumLen[cumLen.length - 1] + Math.sqrt(dx*dx + dy*dy));
    prev = cur;
  }
  const total = cumLen[S];
  const result = [];
  for (let i = 0; i < n; i++) {
    const target = (i / n) * total;
    let j = 0;
    while (j < S - 1 && cumLen[j + 1] < target) j++;
    const frac = cumLen[j+1] > cumLen[j]
      ? (target - cumLen[j]) / (cumLen[j+1] - cumLen[j])
      : 0;
    result.push(((j + frac) / S) * 2 * Math.PI);
  }
  return { tValues: result, totalArc: total };
}

function buildSVGPath(cx, cy, scale, samples) {
  const pts = [];
  for (let i = 0; i <= samples; i++) {
    const t = (i / samples) * 2 * Math.PI;
    const { x, y } = heartMath(t);
    pts.push(`${i===0?'M':'L'}${(cx+x*scale).toFixed(1)},${(cy-y*scale).toFixed(1)}`);
  }
  return pts.join(' ') + 'Z';
}

function renderHeart() {
  const vw = window.innerWidth;
  const n  = SONGS.length;

  // Distribución por arco (math units, scale=1)
  const { tValues, totalArc: totalArcU } = arcLengthParams(n);

  // Calculamos scale de forma que W = 32*scale + chipW + 12 quede dentro de la pantalla.
  // chipW ≈ totalArcU * scale * chipK / n  (fracción del arco por canción)
  // → W ≈ scale*(32 + totalArcU*chipK/n) + 12
  // → scale_max = (safeW - 12) / (32 + totalArcU*chipK/n)
  const chipK  = 0.82;
  const safeW  = vw - 44;            // deja 22 px de margen a cada lado
  const maxScaleRaw = (safeW - 12) / (32 + totalArcU * chipK / n);
  const scale  = Math.max(5, Math.min(Math.floor(maxScaleRaw), 14));

  // Tamaño de chips: acotado por arco/canción
  const arcPerSong = totalArcU * scale / n;
  const chipByArc  = Math.floor(arcPerSong * chipK);
  const chipW      = Math.max(68, chipByArc);
  const chipH      = Math.max(36, Math.floor(chipW * 0.40));
  const titleSz    = Math.max(10, Math.floor(chipW * 0.095));
  const artistSz   = Math.max(8,  Math.floor(chipW * 0.075));

  // Contenedor: padH = chipW/2 + margen → chips en los extremos nunca salen
  const padH = Math.ceil(chipW / 2) + 8;
  const padV = Math.ceil(chipH / 2) + 8;
  const W    = 32 * scale + padH * 2;
  const H    = 29 * scale + padV * 2;
  const cx   = W / 2;
  const cy   = padV + 12 * scale;

  const container = document.getElementById('heartContainer');
  container.style.width  = W + 'px';
  container.style.height = H + 'px';
  container.innerHTML    = '';

  // SVG de guía
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg   = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.classList.add('heart-svg');
  const fillPath = document.createElementNS(svgNS, 'path');
  fillPath.setAttribute('d', buildSVGPath(cx, cy, scale, 300));
  fillPath.setAttribute('fill',         'rgba(196,30,58,0.04)');
  fillPath.setAttribute('stroke',       'rgba(196,30,58,0.16)');
  fillPath.setAttribute('stroke-width', scale < 8 ? '1' : '1.5');
  svg.appendChild(fillPath);
  container.appendChild(svg);

  // Chips de canciones
  for (let i = 0; i < n; i++) {
    const { x: xM, y: yM } = heartMath(tValues[i]);
    const px   = cx + xM * scale - chipW / 2;
    const py   = cy - yM * scale - chipH / 2;
    const song = SONGS[i];

    const chip = document.createElement('a');
    chip.className = 'song-chip';
    if (song.url) {
      chip.href = song.url; chip.target = '_blank'; chip.rel = 'noopener noreferrer';
    } else {
      chip.href = '#';
      chip.addEventListener('click', e => e.preventDefault());
    }
    chip.style.cssText = `left:${px.toFixed(1)}px;top:${py.toFixed(1)}px;width:${chipW}px;height:${chipH}px;`;
    chip.innerHTML = `
      <span class="chip-title"  style="font-size:${titleSz}px">${escHtml(song.title)}</span>
      <span class="chip-artist" style="font-size:${artistSz}px">${escHtml(song.artist)}</span>
    `;
    container.appendChild(chip);
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

renderHeart();

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(renderHeart, 160);
});

// ── Lyrics ─────────────────────────────────────────────────────
function renderLyrics() {
  const container = document.getElementById('lyricsContainer');
  container.innerHTML = '';
  LYRICS.forEach(l => {
    const card = document.createElement('div');
    card.className = 'lyric-card';
    card.innerHTML = `
      <span class="lyric-quote-mark" aria-hidden="true">"</span>
      <p class="lyric-lines">${escHtml(l.lines)}</p>
      <div class="lyric-attribution">
        <span class="lyric-song-name">${escHtml(l.title)} &nbsp;·&nbsp; ${escHtml(l.artist)}</span>
      </div>
      ${l.note ? `<p class="lyric-note">${escHtml(l.note)}</p>` : ''}
    `;
    container.appendChild(card);
  });
}

renderLyrics();
